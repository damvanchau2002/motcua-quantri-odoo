version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: odoo_db
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo123
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ./custom_addons:/opt/odoo/custom_addons
      - ./addons:/opt/odoo/addons
      - ./odoo.cfg:/opt/odoo/odoo.cfg
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo123
    restart: unless-stopped

volumes:
  odoo-db-data:
